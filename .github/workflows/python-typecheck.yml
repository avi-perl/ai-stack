name: Python typecheck

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: ty check
        run: uv run ty check
